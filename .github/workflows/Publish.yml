name: Publish

on:
  push:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        go-version: [1.16.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Checkout Latest GList
        uses: actions/checkout@v3
        with:
          repository: cokebar/gfwlist2dnsmasq
          path: gfwlist2dnsmasq

      - name: Get Latest GList
        run: |
          cd gfwlist2dnsmasq || exit 1
          chmod +x ./gfwlist2dnsmasq.sh
          ./gfwlist2dnsmasq.sh -l -o ./temp-glist.txt

      - name: Set Latest GList
        run: |
          cat ./gfwlist2dnsmasq/temp-glist.txt | perl -ne '/^((?=^.{3,255})[a-zA-Z0-9][-_a-zA-Z0-9]{0,62}(\.[a-zA-Z0-9][-_a-zA-Z0-9]{0,62})+)/ && print "$1\n"' >> ./data/g

      - name: Set Go
        uses: actions/setup-go@v2
        with:
          go-version: ${{ matrix.go-version }}

      - name: Go mod
        run: go mod download

      - run: go run ./

      - name: Get current date
        id: date
        run: echo "today=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Get latest tag
        id: tag
        run: echo "latest=$(wget --no-check-certificate -qO- https://api.github.com/repos/yezige/glist/tags | grep 'name' | cut -d\" -f4 | head -1)" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.date.outputs.today }}
          name: Release ${{ steps.date.outputs.today }}
          draft: false
          prerelease: false
          files: |
            glist.dat
            g.yaml
            gip.yaml
            d.yaml
            dip.yaml

      - name: Upload Google Drive glist.dat
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.credentials }}
          folderId: '1xd2RHRjvMbD1Sgm7YTLwVSZl4VVLL670'
          filename: glist.dat
          overwrite: true
          
      - name: Upload Google Drive g.yaml
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.credentials }}
          folderId: '1xd2RHRjvMbD1Sgm7YTLwVSZl4VVLL670'
          filename: g.yaml
          overwrite: true
          
      - name: Upload Google Drive gip.yaml
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.credentials }}
          folderId: '1xd2RHRjvMbD1Sgm7YTLwVSZl4VVLL670'
          filename: gip.yaml
          overwrite: true
          
      - name: Upload Google Drive d.yaml
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.credentials }}
          folderId: '1xd2RHRjvMbD1Sgm7YTLwVSZl4VVLL670'
          filename: d.yaml
          overwrite: true
      
      - name: Upload Google Drive dip.yaml
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.credentials }}
          folderId: '1xd2RHRjvMbD1Sgm7YTLwVSZl4VVLL670'
          filename: dip.yaml
          overwrite: true
